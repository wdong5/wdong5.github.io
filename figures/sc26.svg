<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="Palatino, 'Palatino Linotype', 'Book Antiqua', Georgia, serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4d4742"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="420" fill="#ffffff"/>

  <!-- outer loop container -->
  <rect x="140" y="25" width="640" height="330" rx="14" fill="#fbfaf8" stroke="#ddd6cc" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="460" y="18" text-anchor="middle" font-size="15" fill="#766d65">closed-loop search</text>

  <!-- User Task -->
  <g>
    <circle cx="70" cy="110" r="32" fill="#fff" stroke="#1f1f1f" stroke-width="1.8"/>
    <circle cx="70" cy="100" r="9" fill="none" stroke="#1f1f1f" stroke-width="1.8"/>
    <path d="M54 126c4-11 28-11 32 0" fill="none" stroke="#1f1f1f" stroke-width="1.8" stroke-linecap="round"/>
    <text x="70" y="158" text-anchor="middle" font-size="16" fill="#1f1f1f" font-weight="700">User Task</text>
  </g>
  <path d="M102 108 L172 100" stroke="#4d4742" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <circle cx="136" cy="103" r="11" fill="#d73f09"/>
  <text x="136" y="108" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">1</text>

  <!-- Best Version -->
  <g>
    <circle cx="70" cy="290" r="32" fill="#fff" stroke="#1f1f1f" stroke-width="1.8"/>
    <path d="M58 290a12 12 0 1 1 4 9" fill="none" stroke="#1f1f1f" stroke-width="1.8"/>
    <path d="M58 290 l-5 -7 M58 290 l8 -2" fill="none" stroke="#1f1f1f" stroke-width="1.8" stroke-linecap="round"/>
    <text x="70" y="338" text-anchor="middle" font-size="16" fill="#1f1f1f" font-weight="700">Best Version</text>
  </g>
  <path d="M175 285 L102 290" stroke="#4d4742" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <circle cx="136" cy="288" r="11" fill="#d73f09"/>
  <text x="136" y="293" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">6</text>

  <!-- Controller -->
  <rect x="175" y="65" width="160" height="70" rx="8" fill="#d73f09"/>
  <text x="255" y="106" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">Controller</text>

  <!-- Coder -->
  <rect x="485" y="65" width="160" height="70" rx="8" fill="#d73f09"/>
  <text x="565" y="106" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">Coder</text>

  <!-- Profiler -->
  <rect x="485" y="250" width="160" height="70" rx="8" fill="#d73f09"/>
  <text x="565" y="291" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">Profiler</text>

  <!-- Validator -->
  <rect x="175" y="250" width="160" height="70" rx="8" fill="#d73f09"/>
  <text x="255" y="291" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">Validator</text>

  <!-- GlobalState / Sandbox -->
  <rect x="350" y="155" width="120" height="64" rx="8" fill="#fff6f0" stroke="#d73f09" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="410" y="182" text-anchor="middle" font-size="14" fill="#1f1f1f" font-weight="700">GlobalState</text>
  <text x="410" y="201" text-anchor="middle" font-size="14" fill="#1f1f1f" font-weight="700">/ Sandbox</text>

  <!-- Controller -> Coder : Strategies (2) -->
  <path d="M335 100 L482 100" stroke="#4d4742" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <circle cx="410" cy="100" r="11" fill="#d73f09"/>
  <text x="410" y="105" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">2</text>
  <text x="410" y="82" text-anchor="middle" font-size="13" fill="#766d65">strategies</text>

  <!-- Coder -> Profiler : Code (3) -->
  <path d="M565 135 L565 247" stroke="#4d4742" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <circle cx="565" cy="191" r="11" fill="#d73f09"/>
  <text x="565" y="196" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">3</text>
  <text x="600" y="196" text-anchor="middle" font-size="13" fill="#766d65">code</text>

  <!-- Profiler -> Validator : hardware utilization (4) -->
  <path d="M482 285 L338 285" stroke="#4d4742" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <circle cx="410" cy="285" r="11" fill="#d73f09"/>
  <text x="410" y="290" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">4</text>
  <text x="410" y="336" text-anchor="middle" font-size="13" fill="#766d65">hardware utilization</text>

  <!-- Validator -> Controller : validated metrics (5) -->
  <path d="M255 247 L255 138" stroke="#4d4742" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <circle cx="255" cy="191" r="11" fill="#d73f09"/>
  <text x="255" y="196" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">5</text>
  <text x="300" y="176" text-anchor="start" font-size="13" fill="#766d65">validated</text>
  <text x="300" y="192" text-anchor="start" font-size="13" fill="#766d65">metrics</text>

  <!-- dotted links to GlobalState -->
  <path d="M335 130 L350 155" stroke="#d73f09" stroke-width="1.2" fill="none" stroke-dasharray="3 3"/>
  <path d="M485 130 L470 155" stroke="#d73f09" stroke-width="1.2" fill="none" stroke-dasharray="3 3"/>
  <path d="M485 250 L470 219" stroke="#d73f09" stroke-width="1.2" fill="none" stroke-dasharray="3 3"/>
  <path d="M335 250 L350 219" stroke="#d73f09" stroke-width="1.2" fill="none" stroke-dasharray="3 3"/>

  <!-- legend -->
  <text x="460" y="382" text-anchor="middle" font-size="13" fill="#1f1f1f">
    <tspan font-weight="700" fill="#d73f09">1</tspan> Task init.&#160;&#160;
    <tspan font-weight="700" fill="#d73f09">2</tspan> Strategy gen.&#160;&#160;
    <tspan font-weight="700" fill="#d73f09">3</tspan> Code gen.&#160;&#160;
    <tspan font-weight="700" fill="#d73f09">4</tspan> Profiling
  </text>
  <text x="460" y="403" text-anchor="middle" font-size="13" fill="#1f1f1f">
    <tspan font-weight="700" fill="#d73f09">5</tspan> Validation &amp; feedback&#160;&#160;
    <tspan font-weight="700" fill="#d73f09">6</tspan> Iteration &amp; termination
  </text>
</svg>
